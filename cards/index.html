<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INVYRA Card · Demos</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f0f11;color:#f6f1e8;display:grid;place-items:center;min-height:100vh;padding:24px}
    .wrap{max-width:820px;width:100%;background:linear-gradient(180deg,#17171a,#101012);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:clamp(28px,4vw,42px)}
    p{color:#d3c6b2;line-height:1.7}
    a{display:inline-block;margin-top:18px;padding:14px 20px;border-radius:999px;background:#e4c792;color:#111;text-decoration:none;font-weight:700}
    .tag{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(228,199,146,.12);color:#e4c792;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  </style>
</head>
<body>
  <main class="wrap">
    <span class="tag">INVYRA Card</span>
    <h1>Demos de tarjetas digitales</h1>
    <p>Base inicial para desarrollar tarjetas de presentación digitales con QR dentro del ecosistema INVYRA. Esta carpeta contiene el primer prototipo: <strong>planner-demo-01</strong>.</p>
    <a href="./planner-demo-01/">Abrir planner-demo-01</a>
  </main>
</body>
</html>
